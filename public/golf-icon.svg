<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: HIG準拠 - iOS がコーナーを丸める -->
  <rect width="512" height="512" fill="#1a5c38"/>
  <!-- 微細なグラデーションで奥行き -->
  <rect width="512" height="512" fill="url(#depth)" opacity="0.15"/>

  <!-- ピン（フラッグスティック） -->
  <rect x="240" y="88" width="14" height="290" rx="7" fill="white"/>

  <!-- フラッグ（幾何学的な三角形） -->
  <path d="M254 96 L364 148 L254 200 Z" fill="white"/>

  <!-- ホール周囲のサークル（グリーン面） -->
  <ellipse cx="247" cy="390" rx="64" ry="16" fill="rgba(0,0,0,0.18)"/>

  <defs>
    <linearGradient id="depth" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="black"/>
    </linearGradient>
  </defs>
</svg>
